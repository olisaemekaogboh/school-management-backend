# ================================
# SERVER
# ================================
server.port=${SERVER_PORT:8443}
server.forward-headers-strategy=framework

# SSL
# Keep enabled only when you actually provide a keystore in the environment.
server.ssl.enabled=${SERVER_SSL_ENABLED:true}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:tomcat}

# ================================
# DATABASE (POSTGRESQL)
# ================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/school_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# DO NOT use update in production.
# Use validate for safer startup until you add Flyway/Liquibase migrations.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ================================
# JACKSON
# ================================
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=Africa/Lagos
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.default-property-inclusion=non_null

# ================================
# FILE UPLOAD
# ================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:10MB}

# Static resources
spring.web.resources.static-locations=file:${FILE_UPLOAD_DIR:./uploads/},classpath:/static/
spring.web.resources.add-mappings=true
spring.mvc.static-path-pattern=/**

# Upload paths
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}
upload.path.students=${UPLOAD_PATH_STUDENTS:./uploads/students/}
upload.path.teachers=${UPLOAD_PATH_TEACHERS:./uploads/teachers/}

# Base URLs
app.base-url=${APP_BASE_URL:https://localhost:8443}
app.frontend-url=${APP_FRONTEND_URL:https://localhost:3000}

# ================================
# SECURITY / JWT
# ================================
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
application.security.jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ================================
# MAIL
# ================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.protocol=${MAIL_PROTOCOL:smtps}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT:10000}

# ================================
# SMS
# ================================
sms.provider=${SMS_PROVIDER:africastalking}
sms.username=${SMS_USERNAME:sandbox}
sms.apiKey=${SMS_API_KEY:}
sms.fromNumber=${SMS_FROM_NUMBER:}
sms.enabled=${SMS_ENABLED:false}

africastalking.api.key=${AFRICASTALKING_API_KEY:}
africastalking.username=${AFRICASTALKING_USERNAME:sandbox}
africastalking.sender.id=${AFRICASTALKING_SENDER_ID:}

# ================================
# LOGGING
# ================================
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_SPRING_WEB:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SPRING_SECURITY:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:WARN}
logging.level.com.inkFront.schoolManagement=${LOG_LEVEL_APP:INFO}